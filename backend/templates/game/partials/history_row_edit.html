<li class="list-group-item d-flex justify-content-between align-items-center p-2 bg-light"
    id="event-row-{{ event.type }}-{{ event.id }}">
    <form hx-put="/game/{{ game.id }}/{{ event.type }}/{{ event.id }}"
        hx-target="#event-row-{{ event.type }}-{{ event.id }}" hx-swap="outerHTML"
        class="d-flex w-100 align-items-center justify-content-between m-0">

        <!-- Left: Type -->
        <div class="d-flex align-items-center" style="min-width: 90px;">
            <span class="fw-bold fs-6">
                {% if event.type == 'buy_in' %}Buy-in
                {% elif event.type == 'add_on' %}Add-on
                {% elif event.type == 'cash_out' %}Cash out{% endif %}
            </span>
        </div>

        <!-- Center: Amount Input -->
        <div class="flex-grow-1 d-flex justify-content-center px-1">
            <input type="number" step="0.01" class="form-control text-center fw-bold fs-5" name="amount"
                value="{{ event.amount }}" style="max-width: 100px;" required>
        </div>

        <!-- Right: Time Input and Actions -->
        <div class="text-end d-flex align-items-center justify-content-end" style="min-width: 160px;">
            <input type="hidden" name="time" value="{{ event.time[:16] }}">
            <span class="text-muted fw-semibold me-3" style="font-size: 0.9rem;">
                {{ event.time[11:16] if event.time|length >= 16 else event.time }}
            </span>

            <div class="d-flex align-items-center gap-2">
                <button type="submit" class="btn btn-light shadow-sm text-success p-2 border rounded lh-1" title="Save">
                    <i class="bi bi-check-lg fs-4"></i>
                </button>
                <button type="button" class="btn btn-light shadow-sm text-secondary p-2 border rounded lh-1"
                    hx-get="/game/{{ game.id }}/{{ event.type }}/{{ event.id }}/row"
                    hx-target="#event-row-{{ event.type }}-{{ event.id }}" hx-swap="outerHTML" title="Cancel">
                    <i class="bi bi-x-lg fs-4"></i>
                </button>
            </div>
        </div>
    </form>
</li>
