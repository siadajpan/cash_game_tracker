{% extends "shared/base.html" %} {% block title %}
<title>Welcome</title>
{% endblock %} {% block page_heading %}Welcome{% endblock %} {% block content%}

<form method="POST">
    <div class="form-floating mb-3">
        <input type="text" required class="form-control" id="nick" name="nick" value="{{nick}}" placeholder="Nick" />
        <label>Nick</label>
    </div>

    {% if errors %}
    <div class="alert alert-danger" role="alert">
        {% for error in errors %}
        <div>{{ error }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Button row -->
    <div class="d-flex justify-content-between align-items-center mt-4">
        <a href="/login" class="btn btn-outline-secondary"><i class="bi bi-box-arrow-in-right me-1"></i> Already
            registered?</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-person-plus-fill me-1"></i> Register</button>
    </div>
</form>
{% endblock %}
