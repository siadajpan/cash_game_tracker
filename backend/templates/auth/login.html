{% extends "shared/base.html" %} {% block title %}
<title>Login</title>
{% endblock %} {% block page_heading %}Login{% endblock %} {% block content %}


<div class="mb-3">
  <form method="POST">
    <div class="form-floating mb-3">
      <input type="text" class="form-control" name="nick" placeholder="Nick" value="{{ form.nick }}" />
      <label>Nick</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" required placeholder="Your password" value="{{ form.password }}" name="password"
        class="form-control" />
      <label>Password</label>

      <div class="mt-2 d-flex justify-content-between">
        <a href="/forgot-password" class="small text-muted">Forgot password?</a>
        <a href="/forgot-nick-id/" class="small text-primary fw-bold">Don't know your ID?</a>
      </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const lastId = localStorage.getItem('last_nick_id');
    if (lastId) {
      const input = document.querySelector('input[name="nick"]');
      if (input && !input.value) {
        input.value = lastId;
      }
    }
  });
</script>

<!-- Button row -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <a href="/welcome" class="btn btn-outline-secondary"><i class="bi bi-person-plus me-1"></i> Create a new
    account</a>
  <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-1"></i> Login</button>
</div>


</form>

</div>
{% endblock %}
