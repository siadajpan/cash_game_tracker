{% extends "shared/base.html" %} {% block title %}
<title>Login</title>
{% endblock %} {% block page_heading %}Login{% endblock %} {% block content %}


<div class="mb-3">
  <form method="POST">
    <div class="form-floating mb-3">
      <input type="text" class="form-control" name="nick" placeholder="Nick" value="{{ form.nick }}" />
      <label>Nick</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" required placeholder="Your password" value="{{ form.password }}" name="password"
        class="form-control" />
      <label>Password</label>

      <div class="mt-2">
        <a href="/forgot-password" class="small text-muted">Forgot your password?</a>
      </div>
    </div>

    <!-- Button row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <a href="/welcome" class="btn btn-outline-secondary"><i class="bi bi-person-plus me-1"></i> Create a new
        account</a>
      <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-1"></i> Login</button>
    </div>

    <div class="d-flex">
      <a href="/login/google" class="btn btn-outline-danger">
        <i class="bi bi-google"></i> Login with Google
      </a>
    </div>
  </form>

</div>
{% endblock %}
