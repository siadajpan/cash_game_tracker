{% if not user_teams %}
<div class="form-floating">
  <select name="team_id" id="team_id" class="form-select">
    <option value="" selected>-- No group (Personal) --</option>
  </select>
  <label>Group</label>
</div>
{% elif user_teams|length == 1 %}
{# If there's only one team, use a hidden input and show team name in a disabled select for consistency #}
<input type="hidden" name="team_id" id="team_id" value="{{ user_teams[0].id }}">

<div class="form-floating">
  <select id="team_id_display" disabled class="form-select">
    <option value="{{ user_teams[0].id }}" selected>
      {{ user_teams[0].name }}
    </option>
  </select>
  <label>Group</label>
</div>

{% else %}
<div class="form-floating">
  <select name="team_id" id="team_id" class="form-select">
    <option value="" {% if not selected_team_id %}selected{% endif %}>
      -- No group (Personal) --
    </option>

    {% for team in user_teams %}
    <option value="{{ team.id }}" {% if team.id|string==selected_team_id|string %}selected{% endif %}>
      {{ team.name }}
    </option>
    {% endfor %}
  </select>

  <label>Group</label>
</div>

{% endif %}
