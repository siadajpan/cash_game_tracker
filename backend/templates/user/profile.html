{% extends "shared/base.html" %}
{% block title %}
<title>User Profile</title>
{% endblock %}
{% block page_heading %}Profile{% endblock %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <form method="POST" id="profileForm">
      <!-- Nickname -->
      <div class="form-floating mb-3">
        <input type="text" required placeholder="Nickname" name="nick" value="{{ form.nick or user.nick }}"
          class="form-control" />
        <label>Nickname</label>
      </div>

      <!-- Nick ID -->
      <div class="form-floating mb-3">
        <input type="text" required placeholder="Nick ID" name="nick_id" value="{{ form.nick_id or user.nick_id }}"
          class="form-control" readonly />
        <label>Nick ID</label>
      </div>

      <hr class="my-4">
      <h5 id="password-section" class="mb-3 text-muted">Change Password (Optional)</h5>

      <!-- Password -->
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input type="password" placeholder="New Password" name="password" value="{{ form.password or '' }}"
              class="form-control" />
            <label>New Password</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="password" placeholder="Confirm Password" name="repeat_password"
              value="{{ form.repeat_password or '' }}" class="form-control" />
            <label>Confirm Password</label>
          </div>
        </div>
      </div>

      <!-- Spacer to prevent content from hiding behind fixed bottom nav -->
      <div style="height: 120px;"></div>
    </form>
  </div>
</div>

<!-- Fixed Bottom Navigation -->
<div class="fixed-bottom bg-white border-top pb-3 pt-2 px-3 shadow" style="z-index: 1030;">
  <div class="d-flex gap-3 justify-content-center mx-auto" style="max-width: 800px;">
    <a href="/"
      class="btn btn-light shadow-sm d-flex flex-column align-items-center justify-content-center border shadow-sm"
      style="width: 80px; padding-top: 0.6rem; padding-bottom: 0.6rem; border-radius: 12px;">
      <i class="bi bi-house mb-1 fs-4 text-secondary"></i>
      <span class="small fw-bold text-secondary" style="font-size: 0.8rem;">Home</span>
    </a>
    <a href="/logout"
      class="btn btn-light shadow-sm d-flex flex-column align-items-center justify-content-center flex-grow-1 border"
      style="padding-top: 0.6rem; padding-bottom: 0.6rem; border-radius: 12px;">
      <i class="bi bi-box-arrow-right mb-1 fs-4 text-danger"></i>
      <span class="small fw-bold text-danger" style="font-size: 0.9rem;">Logout</span>
    </a>
    <button type="submit" form="profileForm"
      class="btn btn-primary shadow-sm d-flex flex-column align-items-center justify-content-center flex-grow-1 border-0 shadow"
      style="padding-top: 0.6rem; padding-bottom: 0.6rem; border-radius: 12px; background: linear-gradient(135deg, #0d6efd, #0a58ca);">
      <i class="bi bi-check-circle mb-1 fs-4 text-white"></i>
      <span class="small fw-bold text-white" style="font-size: 0.9rem;">Save changes</span>
    </button>
  </div>
</div>
{% endblock %}
